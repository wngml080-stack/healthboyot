<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0, must-revalidate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>앱 초기화</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #111;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      section {
        width: 100%;
        max-width: 420px;
      }

      h1 {
        color: #facc15;
        font-size: 20px;
        margin: 0 0 12px;
      }

      p {
        color: #aaa;
        font-size: 14px;
        line-height: 1.6;
        margin: 0 0 18px;
      }

      #status {
        background: #1f1f1f;
        border-radius: 10px;
        color: #fff;
        font-size: 13px;
        padding: 14px;
        word-break: keep-all;
      }

      a {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 22px;
        border-radius: 8px;
        background: #facc15;
        color: #000;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>앱 초기화 중</h1>
        <p>오래된 PWA 캐시와 Service Worker를 제거하고 있습니다.</p>
        <div id="status">초기화 준비 중...</div>
        <a id="fallback" href="/ot" hidden>메인으로 이동</a>
      </section>
    </main>

    <script>
      (function () {
        var statusEl = document.getElementById('status');
        var fallbackEl = document.getElementById('fallback');
        var AUTH_KEY_PART = 'sb-nwyxawtqpdqbsqkpjucu-auth-token';
        var params = new URLSearchParams(location.search);
        var forceLogout = params.get('logout') === '1';
        var resetCountKey = '__pwa_reset_count';
        var resetCount = 0;

        try {
          resetCount = Number(sessionStorage.getItem(resetCountKey) || '0');
          sessionStorage.setItem(resetCountKey, String(resetCount + 1));
        } catch (_) {}

        function setStatus(message) {
          statusEl.textContent = message;
        }

        function delay(ms) {
          return new Promise(function (resolve) {
            setTimeout(resolve, ms);
          });
        }

        async function unregisterServiceWorkers() {
          if (!('serviceWorker' in navigator)) return;
          var registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(function (registration) {
            return registration.unregister().catch(function () {});
          }));
        }

        async function clearCaches() {
          if (!('caches' in window)) return;
          var keys = await caches.keys();
          await Promise.all(keys.map(function (key) {
            return caches.delete(key).catch(function () {});
          }));
        }

        function clearStorage() {
          try {
            var keys = Object.keys(localStorage);
            keys.forEach(function (key) {
              if (forceLogout || key.indexOf(AUTH_KEY_PART) === -1) {
                localStorage.removeItem(key);
              }
            });
          } catch (_) {}

          try {
            sessionStorage.clear();
            sessionStorage.setItem(resetCountKey, String(resetCount + 1));
          } catch (_) {}
        }

        function clearAuthCookies() {
          if (!forceLogout) return;

          try {
            document.cookie.split(';').forEach(function (cookie) {
              var name = cookie.split('=')[0].trim();
              if (name.indexOf('sb-') === 0) {
                document.cookie = name + '=; Max-Age=0; path=/';
                document.cookie = name + '=; Max-Age=0; path=/; domain=healthboyot.cloud';
                document.cookie = name + '=; Max-Age=0; path=/; domain=.healthboyot.cloud';
              }
            });
          } catch (_) {}
        }

        async function run() {
          try {
            if (!forceLogout && resetCount >= 2) {
              setStatus('반복 초기화를 중단했습니다. 로그인 화면으로 이동합니다...');
              await delay(500);
              location.replace('/login?_reset_loop=' + Date.now());
              return;
            }

            setStatus('Service Worker 해제 중...');
            await unregisterServiceWorkers();

            setStatus('캐시 삭제 중...');
            await clearCaches();

            setStatus('임시 저장소 정리 중...');
            clearStorage();
            clearAuthCookies();

            setStatus(forceLogout ? '완료. 로그인 화면으로 이동합니다...' : '완료. 새 앱으로 이동합니다...');
            await delay(500);

            location.replace(forceLogout ? '/login' : '/ot');
          } catch (error) {
            setStatus('초기화 중 오류가 발생했습니다. 아래 버튼으로 다시 이동해주세요.');
            fallbackEl.hidden = false;
          }
        }

        run();
      })();
    </script>
  </body>
</html>
