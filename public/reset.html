<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex">
    <meta http-equiv="Cache-Control" content="no-store, max-age=0, must-revalidate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>앱 초기화</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #111;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      section {
        width: 100%;
        max-width: 420px;
      }

      h1 {
        color: #facc15;
        font-size: 20px;
        margin: 0 0 12px;
      }

      p {
        color: #aaa;
        font-size: 14px;
        line-height: 1.6;
        margin: 0 0 18px;
      }

      #status {
        background: #1f1f1f;
        border-radius: 10px;
        color: #fff;
        font-size: 13px;
        padding: 14px;
        word-break: keep-all;
      }

      a {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 22px;
        border-radius: 8px;
        background: #facc15;
        color: #000;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>앱 초기화 중</h1>
        <p>오래된 PWA 캐시와 Service Worker를 제거하고 있습니다.</p>
        <div id="status">초기화 준비 중...</div>
        <a id="fallback" href="/ot" hidden>메인으로 이동</a>
      </section>
    </main>

    <script>
      (function () {
        var statusEl = document.getElementById('status');
        var fallbackEl = document.getElementById('fallback');
        var AUTH_KEY_PART = 'sb-nwyxawtqpdqbsqkpjucu-auth-token';

        function setStatus(message) {
          statusEl.textContent = message;
        }

        function delay(ms) {
          return new Promise(function (resolve) {
            setTimeout(resolve, ms);
          });
        }

        async function unregisterServiceWorkers() {
          if (!('serviceWorker' in navigator)) return;
          var registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(function (registration) {
            return registration.unregister().catch(function () {});
          }));
        }

        async function clearCaches() {
          if (!('caches' in window)) return;
          var keys = await caches.keys();
          await Promise.all(keys.map(function (key) {
            return caches.delete(key).catch(function () {});
          }));
        }

        function clearStorage() {
          try {
            var keys = Object.keys(localStorage);
            keys.forEach(function (key) {
              if (key.indexOf(AUTH_KEY_PART) === -1) {
                localStorage.removeItem(key);
              }
            });
          } catch (_) {}

          try {
            sessionStorage.clear();
          } catch (_) {}
        }

        async function run() {
          try {
            setStatus('Service Worker 해제 중...');
            await unregisterServiceWorkers();

            setStatus('캐시 삭제 중...');
            await clearCaches();

            setStatus('임시 저장소 정리 중...');
            clearStorage();

            setStatus('완료. 새 앱으로 이동합니다...');
            await delay(500);

            var next = new URL('/ot', location.origin);
            next.searchParams.set('_pwa_reset', Date.now().toString());
            location.replace(next.toString());
          } catch (error) {
            setStatus('초기화 중 오류가 발생했습니다. 아래 버튼으로 다시 이동해주세요.');
            fallbackEl.hidden = false;
          }
        }

        run();
      })();
    </script>
  </body>
</html>
